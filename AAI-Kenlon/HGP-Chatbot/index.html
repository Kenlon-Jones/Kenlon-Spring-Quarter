<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HGP Chatbot</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app"> <!-- Main container for the chatbot UI -->
    <h1>Kenlon's AI Chatbot</h1> <!-- Chatbot title/header-->


    <section id="chat" class="chat"></section> <!-- Where chat messages appear -->


    <form id="form" class="form"> <!-- User input form -->
      <input id="input" placeholder="Ask me something..." autocomplete="off" /> <!-- Text box for user -->
      <button type="submit">Send</button> <!-- Button to send message -->
    </form>
  </main>


  <script src="script.js"></script> <!-- Connects the JavaScript for chat logic -->
</body>
</html>
